/home/deploy/logs/*.log {
    daily
    rotate 30
    compress
    delaycompress
    missingok
    notifempty
    create 644 deploy deploy
    postrotate
        # ログローテーション後の処理（必要に応じて）
    endscript
}

/home/deploy/claude-code-rss/logs/*.log {
    daily
    rotate 14
    compress
    delaycompress
    missingok
    notifempty
    create 644 deploy deploy
    postrotate
        # アプリケーションログのローテーション後処理
    endscript
}